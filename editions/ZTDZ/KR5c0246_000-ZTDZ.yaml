front:
  text: 二篇同卷臨十
  hash: sha256:b5e53b2bad724e2e2952c906b441a115bb3e2f6f697189bea0cb14a922be4707
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0246_SJB_000-180519b, image: sjb/18/180519b.png}
body:
  text: 保生要録修真祕録保生要録序甞聞松有千歲之固雪無一時之堅若植松於腐壞不朞月而必蠹藏雪於隂山雖累年而不消違其性則堅者脆順其理則促者延物情既爾人理豈殊然則所謂調攝之術者又可忽乎臣竊覧前人所譔保生之書往往拘忌大多節目大繁行者難之在於崇貴尤不易爲臣少也多病留心養生研究既久編次云就其術簡易乗間可行先欲固其正氣次欲調其肢體至于衣服居處藥餌之方蔬果禽魚之性有益者必録無補者不書古方有誤者重眀俗用或乖者必正目之曰保生要録雖無禆於聞道粗有資於衞生冒昧上獻伏深戰灼蒲䖍貫謹序保生要録司議郎蒲䖍貫譔養神氣門嵇叔夜云服藥求汗或有弗獲愧情一焦渙然流離眀情發於中而形於外則知喜怒哀樂寜不傷人故心不撓者神不疲神不疲則炁不亂炁不亂則身泰夀延矣調肢體門養生者形要小勞無至大疲故水流則清滯則洿養生之人欲血脉常行如水之流坐不欲至倦行不欲至勞頻行不巳然宜稍緩即是小勞之術也故手足欲時其屈伸兩臂欲左挽右挽如挽弓法或兩手雙拓如拓石法或雙拳築空或手臂左右前後輕擺或頭項左右顧或腰胯左右轉時俯時仰或兩手相捉細細捩如洗手法或兩手掌相摩令熱掩目摩面事間隨意爲之各十數過而巳每日頻行必身輕目明筋節血脉調暢飲食易消無所擁滯體中小不佳快爲之即解舊導引方太煩崇貴之人不易爲也今此術不擇時節亦無度數乗閑便作而見効且速夫人夜卧欲自以手摩四肢胷腹十數過名曰乾浴卧欲側而曲膝益氣力常時濁唾則吐清津則嚥常以舌拄上齶聚清津而嚥之澗五藏恱肌膚令人長夀不老黄庭經曰口爲玉池大和官嗽嚥靈液灾不干又日閉口屈舌食胎津使我遂鍊獲飛仙頻叩齒令齒牢又辟惡夫人春時暑月欲得晚眠早起秋欲早眠早起冬欲早眠晏起早不宜在雞嗚前晚不宜在日出後熱時欲舒暢寒月欲收宻此合四氣之宜保身益夀之道也論衣服門臣聞衣服厚薄欲得隨時合度是以暑月不可全薄寒時不可極温盛熱能著單熟衣卧熟帳或腰腹膝脛巳來覆被極宜人冬月綿衣莫令甚厚寒則頻添重數如此則令人不驟寒驟熱也故寒時而熱則減減則不傷於温熱時而寒則加加則不傷於寒寒熱若時妄自脫著則傷於寒熱矣寒欲漸著熱欲漸脫腰腹下至足脛欲得常温胷上至頭欲得稍涼涼不至凍温不至燥衣爲汗濕即時易之薰衣火氣末歇不可便著夫寒熱平和形神恬静疾疹不生壽年自永論飲食門飲食者所以資養人之血氣血則榮華形體氣則衛獲四肢精華者爲髓爲精其次者為肌為肉常時不可待極饑而方食候極飽而徹饌常欲如饑中飽飽中饑青牛道士云人欲先饑而後食先渇而後飲不欲强食强飲故也又不欲先進熱食而隨餐冷物必冷熱相攻而爲患凡食先熱食次温食方可少餐冷食也凡食太熱則傷骨太冷則傷筋雖熱不得灼脣雖冷不可凍齒凡食温勝冷少勝多熟勝生淡勝鹹凡食熱汗出勿洗面令人失顔色面上如蟲行食飽沐髮作頭風凡所好之物不可偏躭偏躭則傷而生疾所惡之味不可全棄全棄則藏炁不均如全不食苦則心炁虛全不食鹹則腎炁弱是也是以天有五行人有五藏食有五味故肝法木心法火脾法土肺法金腎法水酸納肝苦納心甘納脾辛納肺鹹納腎木生火火生土土生金金生水水生木木制土土制水水制火火制金金制木故四時無多食所王并所制之味皆能傷所王之藏也宜食相生之味助王炁也王藏不傷王氣増益飲食合度寒温得宜則諸疾不生遐齡自永矣論居處門傳曰土厚水深居之不疾故人居處隨其方所皆欲土厚水深土欲堅潤而黄水欲甘美而澄常居之室極令周宻勿有細隟致風氣得入久居善中人風者天地之氣也能生成萬物亦能損人初入腠理之間漸至肌膚之内内傳經脉逹于藏府傳變既廣爲患則深故古人云避風如避矢盛暑久坐兩頭通屋大招風夾道尤甚盛暑不可露卧凡卧自立春後至立秋前欲柬其首立秋後至立春前欲西其首常枕藥枕勝於寳玉寳玉大冷傷腦其枕藥性大熱則熱氣衝上大冷又冷氣傷腦唯用理風平凉者乃為得宜藥枕方久枕治頭風目眩腦重冷疼眼暗鼻塞兼辟邪蔓荆子八分甘菊花八分細辛六分吳白芷六分白术四分芎藭六分通草入分防風八分藁本六分羚羊角八分犀角八分石上菖蒲八分黑豆五合揀擇挼令淨右件藥細剉去碎末相拌令勻以生絹囊盛之欲逹其氣次用碧羅袋重盛縫之如枕樣納藥直令緊實置在合子中其合形亦如枕納藥囊令出合子脣一寸半巳來欲枕時揭去合蓋不枕即蓋之使樂氣不散枕之日久漸低更入藥以實之或添黒豆令如初三五月後藥炁歇則换之初枕旬日或一月耳中微嗚是藥抽風之驗論藥食門辯服金石金石之藥有可服不可服之理欲究養生之術須窮藥右之由今假設問辭用明至理或問日夫金石之藥埋之不腐煑之不爛用能固氣可以延年草木之藥未免腐爛之患馬有固駐之功答曰夫金石之藥其性慓悍而無津液人之盛肚服且無益若及其衰弱毒則發焉夫壯年則氣盛而滑利盛則能制石滑則能行石故不發也及其衰弱則榮衞氣澁澁則不能行石弱則不能制石石無所制而行者留積故爲人大患也欲益而損何固駐之有哉問日亦有未虚而石發者乎答曰憂恚在心而不能宣則榮衞澁滯而不行右勢結積而不散隨其積聚發諸癰瘡又有服石之人倚石勢而縱佚遊石勢既行乃作强中之病不暁者以爲奇効精液焦枯猛熱遂作洞釡加爂罕不焦然問曰金石之爲害若此農皇何以標之於本經答曰太虛積冷之人不妨暫服疾愈而止則無害矣又問前云石勢慓悍藏衰則發今先虚而服石者豈能制其勢力乎且未見其有害何也答曰初服之時石勢永積又乗虚冷之甚故不發也以此觀之當太虛積冷之時暫可服餌若冬長防患則不如草木之藥焉又問草木自不能攵豈能固人哉答曰服之不倦勢力相搂積年之後必獲大益夫攻療乏藥以疾差而見功固駐之方覺體安而是効形神既寧則壽命自永矣果類蓮實粉主補中養神益氣力除百疾夕服輕身延年取蓮實八月就他皮黑者去皮心曝乾擣篩爲粉早以酒或白粥調之不宜與地黄同食蓮實嫰時生食動氣爲粉益人栗子粉主厚腸胃補腎氣取粟子曝乾令皮自拆去皮薄切又曝令極乾檮爲粉如蓮粉法食之凡食栗子生食動蟲發氣熟食亦發脹皆不及曝令半乾衣中近肌肉煖而食之其益人葡萄作漿雖是常術且補益功優主筋骨濕痺益氣力强志令人肥徤攵服輕身不老延年葡萄熟時先於根底著羊肉汁米泔汁名一㪷如是經宿棟熟者樀之納新白瓶中令滿稍實宻封百日自然成漿去滓飲之味過醇酎甚益人榴梨漿治風熱昏悶煩躁青梨大者二十顆石榴十顆淡竹瀝三大升右擣榴梨捩取自然汁澄濾拌竹瀝一服五合日三服梨極大方用二十顆小者三十顆榖并菜類胡麻主腸中虚羸補五内益氣力長肌肉填髓腦堅筋骨去虚熱攵服明目輕身不老延年一名巨勝四稜爲胡麻八稜爲巨勝陶弘景云八榖之中唯此爲良又云味甘在米豆部此正是鳥麻也今時所用巨勝莖莢雖小類麻而葉子大極味苦其性甚冷夫味苦不可八米榖性冷不可爲補益其葉又與麻不同隂暗則低日烈則起此當别是一物非巨勝胡麻也今俗但用不覺其非正當用烏油麻味甘而莢有四稜者爲胡麻八稜者曰巨勝正合本經不當用味苦而冷者也肉類羖䍽羊丈夫食之損陽女人食之絶隂北羊中有角者是羊髓補虛損腦髓食不益人鹿肉温補中强五藏益氣力壺居士云鹿性警烈多食良草處必山岡産必𣼶澤故可饗神者以其潔故也食良草有九物鹿葱鹿藥白蒿水芹甘草山蒼葛葉并根齊頭蒿薺苨鹿常食此九草性能解毒治風壓丹石服附子多食鹿肉附子少力也五月忌食之茸不可近鼻麞肉温補五藏八月至十一月食勝羊肉十二月巳後動風發炁不堪食鰻鯬魚性温主五痔殺諸蟲補陽氣食三五度腰腎間百病自差五色者兼理婦人帶脉百病碎切去骨以五味調肉羊腸中繫兩頭炙之候冷然後切食雞雌而黄者性温主虛渇數溺洩利補五臟益炁力黑者治風圓魚平補去骨節間諸壅熱炁五六月不宜食有人以鼈甲作散五六月間感隂濕炁忽化爲小鼈豬無筋雞無髓藥食多絀之性平補不宜合菌食之酥煎良佳保生要録
